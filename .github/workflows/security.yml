name: Security

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    # Dependency Review is available to public repositories on GitHub Free.
    # Skip while this repository remains private so the quality gate is green
    # before the public launch, then it activates automatically on opening.
    if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Review changed dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  codeql:
    # Kotlin CodeQL for private repositories requires GitHub Advanced Security.
    # Run automatically as soon as the repository is public.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    # CodeQL's Kotlin extractor lags Kotlin releases: as of CodeQL 2.25.2 it
    # supports Kotlin <= 2.3.20 and hard-errors on this project's 2.4.0
    # (KotlinVersionTooRecentError; tracked in github/codeql#21938). Keep the
    # job wired so analysis resumes automatically once support lands, but do
    # not let the upstream lag mark the Security workflow red until then.
    # Remove continue-on-error once CodeQL supports the project's Kotlin.
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: kotlin
          build-mode: manual

      - name: Build code for analysis
        run: ./gradlew classes --no-daemon

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:kotlin
