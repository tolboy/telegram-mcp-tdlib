name: Security

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    # Dependency Review is available to public repositories on GitHub Free.
    # Skip while this repository remains private so the quality gate is green
    # before the public launch, then it activates automatically on opening.
    if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Review changed dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  codeql:
    # Kotlin CodeQL for private repositories requires GitHub Advanced Security.
    # Run automatically as soon as the repository is public.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: kotlin
          build-mode: manual

      # --no-build-cache: CodeQL's tracer must observe real compiler
      # invocations; a FROM-CACHE compileKotlin yields an empty database
      # and Analyze fails with "no source code seen during build".
      - name: Build code for analysis
        run: ./gradlew classes --no-daemon --no-build-cache

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:kotlin
