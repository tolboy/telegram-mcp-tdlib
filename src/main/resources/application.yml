# ═══════════════════════════════════════════════════════════════════════════════
# Telegram MCP Server — Application Configuration
# ═══════════════════════════════════════════════════════════════════════════════

spring:
  application:
    name: telegram-mcp-server
  main:
    banner-mode: log

  # ── MCP Server ─────────────────────────────────────────────────────────────
  ai:
    mcp:
      server:
        name: telegram-mcp-server
        version: ${MCP_SERVER_VERSION:@application.version@}
        type: SYNC
        # Streamable HTTP is the current MCP transport. The same endpoint
        # accepts client requests and may stream server responses as SSE.
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp
          # This server does not need clients to delete sessions explicitly.
          disallow-delete: true

  # ── Jackson ────────────────────────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null

  # ── Lifecycle (graceful shutdown) ──────────────────────────────────────────
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

# ── TDLib (Telegram Database Library) ─────────────────────────────────────────
# Primary Telegram client — requires API credentials from https://my.telegram.org.
# User-account mode (phone-number) unlocks the full MTProto API; bot-token is a
# narrower fallback.
tdlib:
  api:
    id: ${TDLIB_API_ID:0}
    hash: ${TDLIB_API_HASH:}
    hash-file: ${TDLIB_API_HASH_FILE:}
  auth:
    # Optional when a QR-authenticated user session is already persisted.
    # Set phone-number for headless first login, or bot-token for bot mode.
    phone-number: ${TDLIB_PHONE_NUMBER:}
    bot-token: ${TDLIB_BOT_TOKEN:}
    bot-token-file: ${TDLIB_BOT_TOKEN_FILE:}
    # Non-interactive auth: supply these for headless/CI/Docker startup.
    # Leave blank to be prompted on stdin during first run.
    password: ${TDLIB_2FA_PASSWORD:}
    password-file: ${TDLIB_2FA_PASSWORD_FILE:}
    code: ${TDLIB_AUTH_CODE:}
    code-file: ${TDLIB_AUTH_CODE_FILE:}
  database:
    # Blank picks the platform app-data directory (Windows/macOS/Linux).
    # Set an absolute path for containers or a managed server volume.
    directory: ${TDLIB_DATA_DIR:}
    downloads-directory: ${TDLIB_DOWNLOADS_DIR:}
    use-file-database: true
    use-chat-info-database: true
    use-message-database: true
  session:
    use-test-dc: false
    system-language-code: ${TDLIB_SYSTEM_LANGUAGE_CODE:en}
    # Shown in Telegram → Settings → Devices. Keep this stable so existing
    # sessions stay recognizable after upgrades.
    device-model: ${TDLIB_DEVICE_MODEL:Telegram MCP Server}
    # Overridden at runtime from Spring Boot BuildProperties (see
    # TdLibConfig / TelegramAuthOrchestrator). The literal below is only used
    # when running without a built jar (IDE / tests), where `META-INF/build-info.properties`
    # hasn't been generated by the Gradle bootBuildInfo task.
    application-version: "dev"
  # Optional TDLib-native proxy. Leave type blank for a direct connection.
  # Types: socks5, http (HTTP CONNECT), mtproto. Password and secret have
  # mutually-exclusive *_FILE alternatives for mounted secrets.
  proxy:
    type: ${TDLIB_PROXY_TYPE:}
    server: ${TDLIB_PROXY_SERVER:}
    port: ${TDLIB_PROXY_PORT:0}
    username: ${TDLIB_PROXY_USERNAME:}
    password: ${TDLIB_PROXY_PASSWORD:}
    password-file: ${TDLIB_PROXY_PASSWORD_FILE:}
    # false sends all TDLib traffic through the HTTP CONNECT proxy.
    http-only: ${TDLIB_PROXY_HTTP_ONLY:false}
    secret: ${TDLIB_PROXY_SECRET:}
    secret-file: ${TDLIB_PROXY_SECRET_FILE:}
  # TDLib native log verbosity (0=fatal … 5=default … 10=trace)
  log-verbosity-level: ${TDLIB_LOG_VERBOSITY:1}

# ── Telegram (legacy Bot API — optional fallback) ────────────────────────────
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:}
  api:
    base-url: https://api.telegram.org
    timeout: 30s
    max-retries: 3
  security:
    # Comma-separated list of allowed chat IDs (empty = all allowed)
    allowed-chat-ids: ${TELEGRAM_ALLOWED_CHAT_IDS:}
# Optional isolated TDLib accounts are omitted by default. Environment variables
# bind naturally as TELEGRAM_ACCOUNTS_WORK_API_ID, _API_HASH_FILE,
# _PHONE_NUMBER, etc. Each account gets its own TDLib database directory.

# ── MCP Security ──────────────────────────────────────────────────────────────
mcp:
  # Curate tools for a common workflow: all, reader, inbox, community-admin, research.
  tool-profile: ${MCP_TOOL_PROFILE:all}
  # Optional exact-name filters, evaluated profile -> allow -> deny -> read-only.
  # Unknown names fail startup so misspellings cannot silently weaken policy.
  tool-allow: ${MCP_TOOL_ALLOW:}
  tool-deny: ${MCP_TOOL_DENY:}
  security:
    mode: ${MCP_AUTH_MODE:api-key}
    api-key: ${MCP_API_KEY:}
    api-key-file: ${MCP_API_KEY_FILE:}
    # Header name: "Authorization: Bearer <key>" or "X-MCP-API-Key: <key>"
    header-name: ${MCP_AUTH_HEADER:Authorization}
    oauth:
      issuer-uri: ${MCP_OAUTH_ISSUER_URI:}
      jwk-set-uri: ${MCP_OAUTH_JWK_SET_URI:}
      resource-uri: ${MCP_OAUTH_RESOURCE_URI:}
      accounts-claim: ${MCP_OAUTH_ACCOUNTS_CLAIM:telegram_accounts}
      principal-claim: ${MCP_OAUTH_PRINCIPAL_CLAIM:sub}
  descriptor:
    id: telegram-mcp-server
    display-name: Telegram MCP Server
    description: TDLib-backed local-first MCP connector for Telegram workflows
    connector-type: telegram
    deployment-mode: local-first
    default-bind-host: ${MCP_BIND_HOST:127.0.0.1}
    transport-base-path: /mcp
    tags:
      - telegram
      - tdlib
      - mcp
      - local-first
  guardrails:
    max-tool-input-length: 4096
    # Optional operator-defined input denylist. Empty by default: model prompt
    # injection policy belongs to the MCP host that consumes untrusted output.
    blocked-patterns: []

# ── Server Mode (read-only, confirmation, file security, audit) ──────────────
server-mode:
  # When true, all write/mutating tools are blocked (messages, contacts, media upload)
  read-only: ${MCP_READ_ONLY:true}
  confirmation:
    # When true, destructive tools (delete, ban, leave) require "confirmed": true
    enabled: ${MCP_CONFIRMATION_REQUIRED:true}
    # Override default destructive tool list (empty = use built-in defaults)
    destructive-tools: []
  file-security:
    # Allowed root directories for file operations (empty = deny all file ops)
    allowed-roots: ${MCP_FILE_ROOTS:}
    # Maximum file size for uploads in bytes (default 200MB)
    max-file-size-bytes: 209715200
    # Allowed file extensions for uploads (empty = all allowed)
    allowed-extensions: []
  audit:
    # When true, all tool invocations are logged to the audit log
    enabled: ${MCP_AUDIT_ENABLED:true}
    # When true, tool arguments are included in audit entries (may contain PII)
    log-arguments: ${MCP_AUDIT_LOG_ARGS:false}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
    git:
      mode: full
  metrics:
    tags:
      application: telegram-mcp-server
    distribution:
      percentiles-histogram:
        http.server.requests: true

# ── Anti-spam guard ───────────────────────────────────────────────────────────
# Per-tool sliding-window rate limits, daily caps, and duplicate detection.
# Built-in defaults live in AntiSpamGuardService; entries under `rules` here
# override them. Set `internal-chat-ids` for trusted admin chats that should
# get looser limits — an operator can also add the main chat at runtime via
# the `register_internal_chat` tool.
anti-spam:
  enabled: ${ANTI_SPAM_ENABLED:true}
  internal-chat-ids: ${ANTI_SPAM_INTERNAL_CHAT_IDS:}
  notifier:
    enabled: ${ANTI_SPAM_NOTIFIER_ENABLED:true}
    interval-seconds: ${ANTI_SPAM_NOTIFIER_INTERVAL_SECONDS:60}
    max-events-per-notification: 20
  default-rule:
    max-ops: 60
    window-ms: 60000
  # Runtime overrides persisted by AntiSpamPolicyService. Blank disables persistence.
  overrides-file: ${ANTI_SPAM_OVERRIDES_FILE:anti-spam-overrides.json}
  # Hard ceilings — runtime overrides clamp to these. Empty map = no clamp.
  # Per-tool entries can set: max-ops-ceiling, daily-max-ceiling,
  # window-ms-floor, dedup-window-ms-floor.
  ceilings:
    send_message:
      max-ops-ceiling: 30
      daily-max-ceiling: 500
    reply_to_message:
      max-ops-ceiling: 30
      daily-max-ceiling: 500
    join_chat_by_link:
      daily-max-ceiling: 30
    subscribe_public_channel:
      daily-max-ceiling: 30

# ── Public-chat search (read-only) ────────────────────────────────────────────
# The connector only gathers public data. Ranking, lead scoring, and outreach
# belong to a separate client or orchestrator. `chat-allowlist` is optional;
# set it for deterministic smoke tests against chats you control.
public-search:
  enabled: ${PUBLIC_SEARCH_ENABLED:true}
  chat-allowlist: ${PUBLIC_SEARCH_CHAT_ALLOWLIST:}
  limits:
    max-chats-per-search: ${PUBLIC_SEARCH_MAX_CHATS_PER_SEARCH:20}
    max-messages-per-chat: ${PUBLIC_SEARCH_MAX_MESSAGES_PER_CHAT:60}
  fanout:
    max-concurrent-chats: ${PUBLIC_SEARCH_MAX_CONCURRENT_CHATS:5}
    max-concurrent-queries-per-chat: ${PUBLIC_SEARCH_MAX_CONCURRENT_QUERIES_PER_CHAT:3}
    tool-call-timeout-ms: ${PUBLIC_SEARCH_TOOL_CALL_TIMEOUT_MS:25000}

# ── Resilience4j ──────────────────────────────────────────────────────────────
resilience4j:
  ratelimiter:
    instances:
      telegram-api:
        limit-for-period: 30
        limit-refresh-period: 1s
        timeout-duration: 5s
  circuitbreaker:
    instances:
      telegram-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 80

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    # Raise to DEBUG only while diagnosing an issue: MCP transport debug output
    # can include tool payloads, which do not belong in default server logs.
    dev.telegrammcp.server: ${MCP_LOG_LEVEL:INFO}
    org.springframework.ai.mcp: ${MCP_LOG_LEVEL:INFO}
    it.tdlight: INFO
  pattern:
    console: "%d{ISO8601} [%thread] [%X{traceId:-}] [%X{sessionId:-}] %-5level %logger{36} - %msg%n"
